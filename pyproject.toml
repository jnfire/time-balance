[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "time-balance"
version = "0.1.1"
description = "Control sencillo de jornadas y saldo horario"
readme = "README.md"
authors = [ { name = "autogenerated" } ]
# setuptools (used by many CI runners) expects `project.license` to be a string/license-expression.
# Change from a table to a simple string to avoid `configuration error: `project.license` must be string`.
license = "GPL-3.0-only"
license-files = ["LICENSE"]

[project.scripts]
time-balance = "time_balance:main"
